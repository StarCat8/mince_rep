<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINCE — Data Visualization Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --bg2: #111520;
    --bg3: #181d2e;
    --border: #232840;
    --accent: #4f9cf9;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e2e8f0;
    --text2: #8892aa;
    --text3: #4a5568;
    --danger: #f87171;
    --warning: #fbbf24;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  header .subtitle {
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
  }
  header .stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  header .stat {
    text-align: right;
  }
  header .stat-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent3);
  }
  header .stat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* TABS */
  .tabs {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
  }
  .tab {
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text2);
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 89px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 3px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 10px;
    font-family: var(--mono);
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  .filters-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filters-list::-webkit-scrollbar { width: 4px; }
  .filters-list::-webkit-scrollbar-track { background: transparent; }
  .filters-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* FILTER BUILDER */
  .filter-builder {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-builder select, .filter-builder input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-builder select:focus, .filter-builder input:focus {
    border-color: var(--accent);
  }
  .filter-builder select option { background: var(--bg3); }

  .filter-row {
    display: flex;
    gap: 6px;
  }
  .filter-row select { flex: 1; }
  .filter-row select:first-child { flex: 2; }

  .add-filter-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.2s;
    width: 100%;
  }
  .add-filter-btn:hover { background: #6baef9; }

  /* ACTIVE FILTERS */
  .filter-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .filter-chip .chip-col {
    font-family: var(--mono);
    color: var(--accent);
    font-size: 11px;
  }
  .filter-chip .chip-op {
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 11px;
  }
  .filter-chip .chip-val {
    color: var(--text);
    flex: 1;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filter-chip .chip-logic {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--warning);
    cursor: pointer;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg2);
  }
  .filter-chip .chip-remove {
    cursor: pointer;
    color: var(--text3);
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
  }
  .filter-chip .chip-remove:hover { color: var(--danger); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TABLE PANEL */
  .table-panel {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  .table-panel::-webkit-scrollbar { width: 6px; height: 6px; }
  .table-panel::-webkit-scrollbar-track { background: var(--bg); }
  .table-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .table-toolbar {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    width: 240px;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .row-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    margin-left: auto;
  }
  .row-count span { color: var(--accent3); font-weight: 700; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  thead th {
    background: var(--bg3);
    padding: 10px 12px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  thead th:hover { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted { color: var(--accent); }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody td {
    padding: 8px 12px;
    white-space: nowrap;
    color: var(--text);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.numeric {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    text-align: right;
  }
  tbody td.key-col {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent3);
    font-weight: 700;
  }
  tbody td.cat-col {
    color: var(--accent2);
    font-size: 12px;
  }

  /* COL SELECTOR */
  .col-selector-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--mono);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .col-selector-btn:hover { border-color: var(--accent); color: var(--accent); }

  .col-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .col-modal.open { display: flex; }
  .col-modal-inner {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    width: 560px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .col-modal-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .col-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }
  .col-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .col-check:hover { background: var(--bg3); }
  .col-check input { accent-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btn.secondary { background: transparent; color: var(--text2); }
  .modal-btn:hover { opacity: 0.85; }

  /* PLOT PANEL */
  .plot-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .plot-controls {
    padding: 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .plot-control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .plot-control-group label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .plot-control-group select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    min-width: 140px;
    transition: border-color 0.2s;
  }
  .plot-control-group select:focus { border-color: var(--accent); }
  .plot-control-group select option { background: var(--bg3); }

  .plot-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .plot-btn:hover { background: #6baef9; }

  .plot-use-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    align-self: flex-end;
    padding-bottom: 9px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
  }
  .plot-use-filter input { accent-color: var(--accent); }

  #plotly-container {
    flex: 1;
    min-height: 0;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 4px; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    font-family: var(--mono);
    color: var(--text2);
    font-size: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NULL badge */
  .null-badge {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">MINCE</div>
    <div class="subtitle">Data Visualization Tool</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="total-count">—</div>
      <div class="stat-label">Total Stars</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="filtered-count">—</div>
      <div class="stat-label">Filtered</div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('table')">⊞ Data Table</div>
  <div class="tab" onclick="switchTab('plot')">◈ Scatter Plot</div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Filters</span>
      <button class="clear-btn" onclick="clearAllFilters()">Clear all</button>
    </div>
    <div class="filters-list" id="filters-list">
      <div style="color:var(--text3);font-size:11px;font-family:var(--mono);text-align:center;padding:20px 0;">
        No filters active
      </div>
    </div>
    <div class="filter-builder">
      <div class="filter-row">
        <select id="fb-col"></select>
        <select id="fb-op">
          <option value="=">=</option>
          <option value="!=">!=</option>
          <option value=">">&gt;</option>
          <option value=">=">&gt;=</option>
          <option value="<">&lt;</option>
          <option value="<=">&lt;=</option>
          <option value="contains">contains</option>
          <option value="not_contains">not contains</option>
        </select>
      </div>
      <input id="fb-val" type="text" placeholder="Value…" onkeydown="if(event.key==='Enter')addFilter()">
      <select id="fb-logic">
        <option value="AND">AND (intersect)</option>
        <option value="OR">OR (union)</option>
        <option value="XOR">XOR (symmetric diff)</option>
        <option value="NOT">NOT (exclude)</option>
      </select>
      <button class="add-filter-btn" onclick="addFilter()">+ Add Filter</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <!-- TABLE PANEL -->
    <div class="table-panel" id="panel-table">
      <div class="table-toolbar">
        <input class="search-box" id="search-box" type="text" placeholder="Search across all columns…" oninput="renderTable()">
        <button class="col-selector-btn" onclick="openColModal()">Columns ▾</button>
        <div class="row-count">Showing <span id="row-count-val">—</span> rows</div>
      </div>
      <div id="table-container">
        <div class="loading"><div class="spinner"></div> Loading data…</div>
      </div>
    </div>

    <!-- PLOT PANEL -->
    <div class="plot-panel" id="panel-plot" style="display:none;">
      <div class="plot-controls">
        <div class="plot-control-group">
          <label>X Axis</label>
          <select id="plot-x"></select>
        </div>
        <div class="plot-control-group">
          <label>Y Axis</label>
          <select id="plot-y"></select>
        </div>
        <div class="plot-control-group">
          <label>Color (optional)</label>
          <select id="plot-color"><option value="">— none —</option></select>
        </div>
        <div class="plot-control-group">
          <label>Colorscale</label>
          <select id="plot-cscale">
            <option value="Inferno">Inferno</option>
            <option value="Viridis">Viridis</option>
            <option value="Plasma">Plasma</option>
            <option value="Magma">Magma</option>
            <option value="Cividis">Cividis</option>
            <option value="Turbo">Turbo</option>
          </select>
        </div>
        <label class="plot-use-filter">
          <input type="checkbox" id="plot-use-filter" checked>
          Use filtered subset
        </label>
        <button class="plot-btn" onclick="renderPlot()">▶ Plot</button>
      </div>
      <div id="plotly-container">
        <div class="empty-state">
          <div class="icon">◈</div>
          <div>Select axes and click Plot</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- COLUMN SELECTOR MODAL -->
<div class="col-modal" id="col-modal" onclick="if(event.target===this)closeColModal()">
  <div class="col-modal-inner">
    <div class="col-modal-title">VISIBLE COLUMNS</div>
    <div class="col-grid" id="col-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="selectAllCols()">Select All</button>
      <button class="modal-btn secondary" onclick="selectKeyCols()">Key Cols</button>
      <button class="modal-btn primary" onclick="closeColModal()">Apply</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let allData = [];
let filteredData = [];
let filters = [];
let visibleCols = [];
let allCols = [];
let numericCols = [];
let stringCols = [];
let sortCol = null, sortAsc = true;

const KEY_COLS = ['main_id_2', 'Teff', 'logg', 'micro', 'Fe', 'Festd', 'OBS', 'facility', 'who',
  'O','Na','Mg','Al','Si','Ca','ScII','TiI','TiII','V','Cr','Mn','Co','Ni','Cu','Zn',
  'Sr','Y','Zr','Ba','La','Ce','Pr','Nd','Sm','Eu'];

const CAT_COLS = ['OBS','facility','has_paper_olda_1','who','selection_1','target_id','main_id_2','Strut'];

// ============================================================
// LOAD DATA
// ============================================================
Papa.parse('MINCE32.csv', {
  download: true,
  header: true,
  dynamicTyping: true,
  skipEmptyLines: true,
  complete: function(results) {
    allData = results.data;
    allCols = results.meta.fields;
    numericCols = allCols.filter(c => !CAT_COLS.includes(c));
    stringCols = CAT_COLS;

    // Default visible: key cols
    visibleCols = [...KEY_COLS].filter(c => allCols.includes(c));

    document.getElementById('total-count').textContent = allData.length;

    populateColSelects();
    populateFilterColSelect();
    applyFilters();
    renderTable();
    buildColModal();
  }
});

// ============================================================
// COLUMN SELECTS (filter builder + plot)
// ============================================================
function populateFilterColSelect() {
  const sel = document.getElementById('fb-col');
  allCols.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function populateColSelects() {
  const numOnly = allCols.filter(c => !CAT_COLS.includes(c));
  ['plot-x','plot-y'].forEach(id => {
    const sel = document.getElementById(id);
    numOnly.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  });
  // Sensible defaults
  const xDef = numOnly.find(c => c==='Fe') || numOnly[0];
  const yDef = numOnly.find(c => c==='Mg') || numOnly[1];
  document.getElementById('plot-x').value = xDef;
  document.getElementById('plot-y').value = yDef;

  // Color: numeric only
  const csel = document.getElementById('plot-color');
  numOnly.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    csel.appendChild(o);
  });
  csel.value = 'Teff';
}

// ============================================================
// FILTER LOGIC
// ============================================================
function addFilter() {
  const col = document.getElementById('fb-col').value;
  const op  = document.getElementById('fb-op').value;
  const val = document.getElementById('fb-val').value.trim();
  const logic = document.getElementById('fb-logic').value;
  if (!val) { alert('Enter a value'); return; }

  // Parse value
  const numVal = parseFloat(val);
  const isNum = !isNaN(numVal) && val !== '';

  filters.push({ col, op, val: isNum ? numVal : val, rawVal: val, logic, id: Date.now() });
  document.getElementById('fb-val').value = '';
  renderFilters();
  applyFilters();
  renderTable();
}

function removeFilter(id) {
  filters = filters.filter(f => f.id !== id);
  renderFilters();
  applyFilters();
  renderTable();
}

function toggleLogic(id) {
  const f = filters.find(f => f.id === id);
  if (!f) return;
  const opts = ['AND','OR','XOR','NOT'];
  f.logic = opts[(opts.indexOf(f.logic)+1) % opts.length];
  renderFilters();
  applyFilters();
  renderTable();
}

function clearAllFilters() {
  filters = [];
  renderFilters();
  applyFilters();
  renderTable();
}

function testRow(row, filter) {
  const cell = row[filter.col];
  const val = filter.val;
  if (cell === null || cell === undefined || cell === '') return false;
  switch(filter.op) {
    case '=': return String(cell).toLowerCase() === String(val).toLowerCase();
    case '!=': return String(cell).toLowerCase() !== String(val).toLowerCase();
    case '>': return parseFloat(cell) > parseFloat(val);
    case '>=': return parseFloat(cell) >= parseFloat(val);
    case '<': return parseFloat(cell) < parseFloat(val);
    case '<=': return parseFloat(cell) <= parseFloat(val);
    case 'contains': return String(cell).toLowerCase().includes(String(val).toLowerCase());
    case 'not_contains': return !String(cell).toLowerCase().includes(String(val).toLowerCase());
  }
  return false;
}

function applyFilters() {
  if (filters.length === 0) {
    filteredData = [...allData];
    document.getElementById('filtered-count').textContent = allData.length;
    return;
  }

  // Start with first filter (always applied as base)
  let result = new Set(allData.filter(r => testRow(r, filters[0])).map((_, i) => allData.indexOf(r => false) ));
  // Use index-based sets
  const idxAll = allData.map((_, i) => i);
  let resultSet = new Set(idxAll.filter(i => testRow(allData[i], filters[0])));

  for (let fi = 1; fi < filters.length; fi++) {
    const f = filters[fi];
    const matchSet = new Set(idxAll.filter(i => testRow(allData[i], f)));
    if (f.logic === 'AND') {
      resultSet = new Set([...resultSet].filter(i => matchSet.has(i)));
    } else if (f.logic === 'OR') {
      matchSet.forEach(i => resultSet.add(i));
    } else if (f.logic === 'XOR') {
      const xor = new Set([
        ...[...resultSet].filter(i => !matchSet.has(i)),
        ...[...matchSet].filter(i => !resultSet.has(i))
      ]);
      resultSet = xor;
    } else if (f.logic === 'NOT') {
      matchSet.forEach(i => resultSet.delete(i));
    }
  }

  filteredData = [...resultSet].map(i => allData[i]);
  document.getElementById('filtered-count').textContent = filteredData.length;
}

function renderFilters() {
  const el = document.getElementById('filters-list');
  if (filters.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:11px;font-family:var(--mono);text-align:center;padding:20px 0;">No filters active</div>';
    return;
  }
  el.innerHTML = filters.map((f, i) => `
    <div class="filter-chip">
      ${i > 0 ? `<span class="chip-logic" onclick="toggleLogic(${f.id})" title="Click to cycle logic">${f.logic}</span>` : ''}
      <span class="chip-col">${f.col}</span>
      <span class="chip-op">${f.op}</span>
      <span class="chip-val" title="${f.rawVal}">${f.rawVal}</span>
      <span class="chip-remove" onclick="removeFilter(${f.id})">✕</span>
    </div>
  `).join('');
}

// ============================================================
// TABLE RENDERING
// ============================================================
function renderTable() {
  const search = document.getElementById('search-box').value.toLowerCase();
  let data = filteredData;

  if (search) {
    data = data.filter(row =>
      visibleCols.some(c => String(row[c] ?? '').toLowerCase().includes(search))
    );
  }

  // Sort
  if (sortCol) {
    data = [...data].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av === null || av === undefined) return 1;
      if (bv === null || bv === undefined) return -1;
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }

  document.getElementById('row-count-val').textContent = data.length;

  const container = document.getElementById('table-container');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state" style="height:300px;"><div class="icon">∅</div><div>No rows match current filters</div></div>';
    return;
  }

  const thead = `<thead><tr>${visibleCols.map(c => {
    const isSorted = sortCol === c;
    return `<th class="${isSorted?'sorted':''}" onclick="sortBy('${c}')">
      ${c}<span class="sort-icon">${isSorted ? (sortAsc ? '↑' : '↓') : '↕'}</span>
    </th>`;
  }).join('')}</tr></thead>`;

  const tbody = '<tbody>' + data.map(row => {
    return '<tr>' + visibleCols.map(c => {
      const val = row[c];
      if (val === null || val === undefined || val === '') {
        return `<td><span class="null-badge">—</span></td>`;
      }
      if (c === 'main_id_2' || c === 'target_id') return `<td class="key-col">${val}</td>`;
      if (CAT_COLS.includes(c)) return `<td class="cat-col">${val}</td>`;
      if (typeof val === 'number') return `<td class="numeric">${Number.isInteger(val) ? val : val.toFixed(4)}</td>`;
      return `<td>${val}</td>`;
    }).join('') + '</tr>';
  }).join('') + '</tbody>';

  container.innerHTML = `<table>${thead}${tbody}</table>`;
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

// ============================================================
// COLUMN MODAL
// ============================================================
function buildColModal() {
  const grid = document.getElementById('col-grid');
  grid.innerHTML = allCols.map(c => `
    <label class="col-check">
      <input type="checkbox" data-col="${c}" ${visibleCols.includes(c)?'checked':''}>
      ${c}
    </label>
  `).join('');
}

function openColModal() { document.getElementById('col-modal').classList.add('open'); }
function closeColModal() {
  const checks = document.querySelectorAll('#col-grid input[type=checkbox]');
  visibleCols = [...checks].filter(c => c.checked).map(c => c.dataset.col);
  document.getElementById('col-modal').classList.remove('open');
  renderTable();
}
function selectAllCols() {
  document.querySelectorAll('#col-grid input').forEach(c => c.checked = true);
}
function selectKeyCols() {
  document.querySelectorAll('#col-grid input').forEach(c => {
    c.checked = KEY_COLS.includes(c.dataset.col);
  });
}

// ============================================================
// PLOT
// ============================================================
function renderPlot() {
  const xCol = document.getElementById('plot-x').value;
  const yCol = document.getElementById('plot-y').value;
  const colorCol = document.getElementById('plot-color').value;
  const cscale = document.getElementById('plot-cscale').value;
  const useFilter = document.getElementById('plot-use-filter').checked;

  const data = useFilter ? filteredData : allData;

  const xs = data.map(r => r[xCol]);
  const ys = data.map(r => r[yCol]);
  const labels = data.map(r => r['main_id_2'] || r['target_id'] || '');

  const validMask = xs.map((x, i) => x !== null && x !== undefined && ys[i] !== null && ys[i] !== undefined);
  const xf = xs.filter((_, i) => validMask[i]);
  const yf = ys.filter((_, i) => validMask[i]);
  const lf = labels.filter((_, i) => validMask[i]);

  let marker = {
    size: 7,
    opacity: 0.85,
    line: { width: 0.5, color: 'rgba(255,255,255,0.1)' }
  };

  if (colorCol) {
    const cs = data.map(r => r[colorCol]).filter((_, i) => validMask[i]);
    const cmin = Math.min(...cs.filter(v => v !== null && v !== undefined));
    const cmax = Math.max(...cs.filter(v => v !== null && v !== undefined));
    marker = {
      ...marker,
      color: cs,
      colorscale: cscale,
      cmin, cmax,
      showscale: true,
      colorbar: {
        title: { text: colorCol, font: { color: '#8892aa', size: 11 } },
        tickfont: { color: '#8892aa', size: 10 },
        bgcolor: 'rgba(0,0,0,0)',
        bordercolor: '#232840',
        len: 0.75
      }
    };
  } else {
    marker.color = '#4f9cf9';
  }

  const trace = {
    x: xf, y: yf,
    mode: 'markers',
    type: 'scatter',
    text: lf,
    hovertemplate: `<b>%{text}</b><br>${xCol}: %{x}<br>${yCol}: %{y}<extra></extra>`,
    marker
  };

  const layout = {
    paper_bgcolor: '#0a0d14',
    plot_bgcolor: '#111520',
    font: { family: 'Space Mono, monospace', color: '#8892aa', size: 11 },
    xaxis: {
      title: { text: xCol, font: { color: '#e2e8f0', size: 13 } },
      gridcolor: '#232840', zerolinecolor: '#2d3555',
      tickfont: { color: '#8892aa' }
    },
    yaxis: {
      title: { text: yCol, font: { color: '#e2e8f0', size: 13 } },
      gridcolor: '#232840', zerolinecolor: '#2d3555',
      tickfont: { color: '#8892aa' }
    },
    margin: { t: 30, r: 20, b: 60, l: 60 },
    hoverlabel: {
      bgcolor: '#181d2e',
      bordercolor: '#232840',
      font: { family: 'Space Mono', color: '#e2e8f0', size: 11 }
    }
  };

  const config = {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['select2d','lasso2d'],
    toImageButtonOptions: { format: 'png', scale: 2 }
  };

  Plotly.newPlot('plotly-container', [trace], layout, config);
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-table').style.display = tab==='table' ? 'block' : 'none';
  document.getElementById('panel-plot').style.display = tab==='plot' ? 'flex' : 'none';
  if (tab==='plot') {
    setTimeout(() => {
      const pc = document.getElementById('plotly-container');
      if (pc._fullLayout) Plotly.relayout('plotly-container', {});
    }, 50);
  }
}
